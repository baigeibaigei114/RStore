services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: rs-postgres
    restart: unless-stopped
    mem_limit: 768m
    environment:
      POSTGRES_DB: rs_image_asset
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      TZ: Asia/Shanghai
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rs_image_asset"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rs-rabbitmq
    restart: unless-stopped
    mem_limit: 384m
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      TZ: Asia/Shanghai
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: rs-minio
    restart: unless-stopped
    mem_limit: 512m
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      TZ: Asia/Shanghai
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  redis:
    image: redis:7.4
    container_name: rs-redis
    restart: unless-stopped
    mem_limit: 128m
    command: redis-server --appendonly yes --maxmemory 96mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  geoserver:
    image: kartoza/geoserver:2.25.2
    container_name: rs-geoserver
    restart: unless-stopped
    mem_limit: 1536m
    environment:
      GEOSERVER_ADMIN_USER: admin
      GEOSERVER_ADMIN_PASSWORD: geoserver
      JAVA_OPTS: -Xms256m -Xmx1152m
      TZ: Asia/Shanghai
    ports:
      - "8081:8080"
    volumes:
      - geoserver_data:/opt/geoserver/data_dir
      - ./data/geoserver-raster:/opt/geoserver/raster-data
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rs-backend
    restart: unless-stopped
    mem_limit: 2g
    environment:
      JAVA_TOOL_OPTIONS: -Xms256m -Xmx1024m
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/rs_image_asset
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 1234
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET_NAME: remote-sensing-images
      GEOSERVER_URL: http://geoserver:8080/geoserver
      GEOSERVER_USERNAME: admin
      GEOSERVER_PASSWORD: geoserver
      GEOSERVER_SHARED_DATA_LOCAL_DIR: /app/data/geoserver-raster
      GEOSERVER_SHARED_DATA_GEOSERVER_DIR: /opt/geoserver/raster-data
      PYTHON_WORKER_PYTHON_EXECUTABLE: /opt/rs-python/bin/python
      PYTHON_WORKER_PARSE_METADATA_SCRIPT: /app/python-worker/scripts/parse_metadata.py
      PYTHON_WORKER_THUMBNAIL_SCRIPT: /app/python-worker/scripts/generate_thumbnail.py
      APP_AUTH_JWT_SECRET: dev-secret-change-me
    ports:
      - "8080:8080"
    volumes:
      - ./data/geoserver-raster:/app/data/geoserver-raster
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      minio:
        condition: service_started
      redis:
        condition: service_started
      geoserver:
        condition: service_started

  python-worker:
    build:
      context: ./python-worker
      dockerfile: Dockerfile
    container_name: rs-python-worker
    restart: unless-stopped
    mem_limit: 2816m
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_QUEUE: rs.task.queue
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      BACKEND_BASE_URL: http://backend:8080
      WORKER_TEMP_DIR: /tmp/rs-worker
    depends_on:
      rabbitmq:
        condition: service_started
      minio:
        condition: service_started
      backend:
        condition: service_started

volumes:
  postgres_data:
  rabbitmq_data:
  minio_data:
  redis_data:
  geoserver_data:
