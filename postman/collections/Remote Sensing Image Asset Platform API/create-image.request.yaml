$kind: http-request
method: POST
url: '{{baseUrl}}/images'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "imageCode": "IMG-001",
      "imageName": "Test Image",
      "sensorType": "Sentinel-2",
      "satelliteName": "Sentinel-2A",
      "acquisitionTime": "2026-05-07T08:00:00Z",
      "cloudPercent": 12.5,
      "resolutionMeter": 10,
      "bandCount": 4,
      "projection": "EPSG:4326",
      "width": 1024,
      "height": 1024,
      "fileFormat": "GeoTIFF",
      "fileSize": 2048000,
      "minioBucket": "remote-sensing-images",
      "objectKey": "images/test-image.tif",
      "overviewObjectKey": "images/test-image-overview.jpg",
      "footprintWkt": "POLYGON((116.3 39.9,116.4 39.9,116.4 40.0,116.3 40.0,116.3 39.9))",
      "centerLon": 116.35,
      "centerLat": 39.95,
      "description": "Created from Postman test collection"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
        pm.response.to.have.status(200);
      });

      let json;
      try {
        json = pm.response.json();
      } catch (e) {
        pm.test("Response is valid JSON", function () {
          pm.expect.fail("Invalid JSON response");
        });
      }

      pm.test("Envelope has code, message, data", function () {
        pm.expect(json).to.have.property("code");
        pm.expect(json).to.have.property("message");
        pm.expect(json).to.have.property("data");
      });

      pm.test("Envelope code is 200", function () {
        pm.expect(json.code).to.eql(200);
      });

      pm.test("Created data contains id or imageCode", function () {
        pm.expect(json.data).to.satisfy(function (d) {
          return d && (d.id || d.imageCode);
        });
      });

      if (json && json.data && json.data.id) {
        pm.environment.set("imageId", String(json.data.id));
      }
