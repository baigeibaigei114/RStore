$kind: http-request
name: 'List Images'
method: GET
url: '{{baseUrl}}/images?pageNum={{pageNum}}&pageSize={{pageSize}}'
order: 3000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
        pm.response.to.have.status(200);
      });

      let json;
      try {
        json = pm.response.json();
      } catch (e) {
        pm.test("Response is valid JSON", function () {
          pm.expect.fail("Invalid JSON response");
        });
      }

      pm.test("Envelope has code, message, data", function () {
        pm.expect(json).to.have.property("code");
        pm.expect(json).to.have.property("message");
        pm.expect(json).to.have.property("data");
      });

      pm.test("Envelope code is 200", function () {
        pm.expect(json.code).to.eql(200);
      });

      pm.test("Page result has required fields", function () {
        pm.expect(json.data).to.have.property("records");
        pm.expect(json.data).to.have.property("total");
        pm.expect(json.data).to.have.property("pageNum");
        pm.expect(json.data).to.have.property("pageSize");
      });

      pm.test("records is an array", function () {
        pm.expect(Array.isArray(json.data.records)).to.be.true;
      });

      pm.test("pageNum and pageSize match variables", function () {
        pm.expect(Number(json.data.pageNum)).to.eql(Number(pm.environment.get("pageNum")));
        pm.expect(Number(json.data.pageSize)).to.eql(Number(pm.environment.get("pageSize")));
      });
