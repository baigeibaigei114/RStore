server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: rs-image-asset-platform

  profiles:
    active: dev

  datasource:
    # 后续接入 PostgreSQL/PostGIS 时替换为真实连接信息。
    url: jdbc:postgresql://localhost:5433/rs_image_asset
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  servlet:
    multipart:
      max-file-size: 1024MB
      max-request-size: 1024MB

  data:
    redis:
      host: localhost
      port: 6379
      database: 0

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
    listener:
      simple:
        acknowledge-mode: manual

app:
  auth:
    jwt-secret: dev-secret-change-me
    token-expire-minutes: 1440

rabbitmq:
  remote-sensing-task:
    exchange: rs.task.exchange
    queue: rs.task.queue
    routing-key: rs.task.submit
    dead-letter-exchange: rs.task.dlx.exchange
    dead-letter-queue: rs.task.dlx.queue
    dead-letter-routing-key: rs.task.dlx
    max-retry-count: 3
    outbox-batch-size: 20
    outbox-retry-delay-ms: 30000
    outbox-max-retry-count: 5

minio:
  endpoint: http://localhost:9000
  public-endpoint: http://localhost:9000
  region: us-east-1
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: remote-sensing-images

python-worker:
  python-executable: python
  parse-metadata-script: python-worker/scripts/parse_metadata.py
  thumbnail-script: python-worker/scripts/generate_thumbnail.py
  timeout-seconds: 60

upload:
  max-concurrent: 2
  thumbnail-core-pool-size: 1
  thumbnail-max-pool-size: 2
  thumbnail-queue-capacity: 20
  thumbnail-retry-batch-size: 20
  thumbnail-retry-fixed-delay-ms: 60000

geoserver:
  url: http://localhost:8081/geoserver
  username: admin
  password: geoserver
  workspace: remote_sensing
  shared-data-local-dir: data/geoserver-raster
  shared-data-geoserver-dir: /opt/geoserver/raster-data
  connect-timeout-seconds: 5
  read-timeout-seconds: 30

elasticsearch:
  uris: http://localhost:9200

mybatis:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.remotesensing.platform.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.remotesensing.platform: info
