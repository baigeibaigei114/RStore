server:
  servlet:
    context-path: /api

spring:
  application:
    name: rs-image-asset-platform-test

  datasource:
    url: jdbc:h2:mem:rs_image_asset_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  sql:
    init:
      mode: never

  servlet:
    multipart:
      max-file-size: 32MB
      max-request-size: 32MB

  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: test
    password: test
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
    listener:
      simple:
        auto-startup: false
      direct:
        auto-startup: false

app:
  auth:
    jwt-secret: test-secret-change-me
    token-expire-minutes: 60

rabbitmq:
  remote-sensing-task:
    exchange: rs.task.exchange
    queue: rs.task.queue
    routing-key: rs.task.submit
    dead-letter-exchange: rs.task.dlx.exchange
    dead-letter-queue: rs.task.dlx.queue
    dead-letter-routing-key: rs.task.dlx
    max-retry-count: 3
    outbox-batch-size: 5
    outbox-retry-delay-ms: 1000
    outbox-max-retry-count: 3

minio:
  endpoint: http://127.0.0.1:19000
  public-endpoint: http://127.0.0.1:19000
  region: us-east-1
  access-key: test-access-key
  secret-key: test-secret-key
  bucket-name: test-remote-sensing-images

python-worker:
  python-executable: python
  parse-metadata-script: python-worker/scripts/parse_metadata.py
  thumbnail-script: python-worker/scripts/generate_thumbnail.py
  timeout-seconds: 5

upload:
  max-concurrent: 2
  thumbnail-core-pool-size: 1
  thumbnail-max-pool-size: 1
  thumbnail-queue-capacity: 2
  thumbnail-retry-batch-size: 5
  thumbnail-retry-fixed-delay-ms: 60000

geoserver:
  url: http://127.0.0.1:18081/geoserver
  username: test
  password: test
  workspace: test_remote_sensing
  shared-data-local-dir: target/test-geoserver-raster
  shared-data-geoserver-dir: /opt/geoserver/raster-data
  connect-timeout-seconds: 1
  read-timeout-seconds: 2

elasticsearch:
  uris: http://127.0.0.1:19200

mybatis:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.remotesensing.platform.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.remotesensing.platform: debug
